name: Close Expired Events

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  close-expired:
    runs-on: ubuntu-latest
    steps:
      - name: Call close-expired endpoint
        run: |
          tmpfile=$(mktemp)
          http_code=$(curl -s -w "%{http_code}" -o "$tmpfile" \
            --max-time 55 --retry 2 --retry-delay 5 \
            -X GET "${{ secrets.APP_URL }}/api/cron/close-expired" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          body=$(cat "$tmpfile")
          rm -f "$tmpfile"
          echo "HTTP status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ne 200 ]; then
            echo "Cron job failed with status $http_code"
            exit 1
          fi
